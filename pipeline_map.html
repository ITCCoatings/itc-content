const STATUS_COLORS = {"Customer":"#2d5016","Partner":"#1a73e8","Engaged Prospect":"#f5a623","Qualified Prospect":"#9b59b6","Dormant":"#95a5a6"};

const map = L.map('map').setView([38, -30], 3);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors',
  maxZoom: 18
}).addTo(map);

let markers = [];

function createMarker(d) {
  const color = STATUS_COLORS[d.status] || '#999';
  const radius = d.revenue > 50000 ? 12 : d.revenue > 10000 ? 9 : d.revenue > 0 ? 7 : 5;
  
  const marker = L.circleMarker([d.lat, d.lng], {
    radius: radius,
    fillColor: color,
    color: '#fff',
    weight: 2,
    opacity: 1,
    fillOpacity: 0.85
  });
  
  const revenueStr = d.revenue > 0 ? '$' + d.revenue.toLocaleString() : 'No revenue';
  
  marker.bindPopup(`
    <div class="popup-title">${d.name}</div>
    <div class="popup-row"><span class="popup-badge" style="background:${color}">${d.status}</span></div>
    <div class="popup-row"><strong>Location:</strong> ${d.location}</div>
    <div class="popup-row"><strong>Industry:</strong> ${d.industry}</div>
    <div class="popup-row"><strong>Stage:</strong> ${d.stage}</div>
    <div class="popup-row popup-revenue">${revenueStr}</div>
    ${d.lastOrder !== 'N/A' ? '<div class="popup-row"><strong>Last Order:</strong> ' + d.lastOrder + '</div>' : ''}
    ${d.size ? '<div class="popup-row"><strong>Size:</strong> ' + d.size + '</div>' : ''}
    <div class="popup-row"><strong>Contacts:</strong> ${d.contacts}</div>
    ${d.action ? '<div class="popup-action">Next: ' + d.action + '</div>' : ''}
  `, { maxWidth: 300 });
  
  marker.data = d;
  return marker;
}

function renderMarkers() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  
  const statusVal = document.getElementById('statusFilter').value;
  const industryVal = document.getElementById('industryFilter').value;
  
  DATA.forEach(d => {
    if (statusVal !== 'all' && d.status !== statusVal) return;
    if (industryVal !== 'all' && d.industry !== industryVal) return;
    
    const m = createMarker(d);
    m.addTo(map);
    markers.push(m);
  });
}

function filterMarkers() {
  renderMarkers();
}

renderMarkers();
